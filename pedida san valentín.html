<!DOCTYPE html>
<html lang = es>
    <head>
        <meta charset="UTF-8">
        <title>Quieres ser mi San Valentín? :D</title>

        <style>
            body {
                margin: 0;
                height: 100bv;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background: linear-gradient(135deg, #00c9c9, #82ffcf);
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
                position: relative;
            }

            h1 {
                font-size: 5rem;
                color: white;
                margin-bottom: 20px;
                z-index: 2;
                align-self: center;
            }

            img {
                width: 600px;
                margin-bottom: 30px;
                z-index: 2;
            }

            .buttons {
                position: relative;
                z-index: 2;
                display: flex;
                gap: 40px;
                position: relative;
                
            }
            button {
                font-size: 2rem;
                border: none;
                border-radius: 50px;
                cursor: pointer;
                transition: transform 0.25s ease, left 0.25s ease, top 0.25s ease;
            }

            #yesBtn {
                background-color: #69ffa7;
                color: white;
                padding: 100px 200px;
            }
            #noBtn {
                background-color: #ff8080;
                color: white;
                padding: 100px 200px;
                position: inherit;
            }

            /*Hearts*/
            .heart {
                position:fixed;
                bottom: -50px;
                font-size: 24px;
                opacity: 0.7;
                color: aqua;
                animation: floatUp 6s linear;
            }

            @keyframes floatUp {
                0% {
                    transform: translateY(0);
                    opacity: 0.7;
                }
                100% {
                    transform: translateY(-110vh);
                    opacity: 0;
                }
            }

        </style>
    </head>
    <body>
        <h1>¿Quieres ser mi San Valentín?</h1>

        <img id="gif_image" src="https://media.tenor.com/O1HfQmbjgLEAAAAj/cute-couple.gif">

        <div class="buttons">
            <button id="yesBtn">Sí :D</button>
            <button id="noBtn">No D:</button>
        </div>

        <script>
            const noBtn = document.getElementById("noBtn");
            const yesBtn = document.getElementById("yesBtn");
            let scale = 1;
            let yesScale = 1;

            const gif_image = document.getElementById("gif_image");

            // Screen limits
            const maxX = (window.innerWidth - noBtn.offsetWidth) * 0.5;
            const maxY = (window.innerHeight - noBtn.offsetHeight) * 0.5;
            // No texts
            let textIndex = 0;
            const noTexts = [
                "Amor?",
                "Q haces?",
                "Mamona, segura?",
                "NO",
                "ES",
                "NO"
            ];
            // Image links
            let hamsterIndex = 0;
            const gifs_hamsters = [
                "https://media1.tenor.com/m/QyUSDDNydgUAAAAC/rat-cry-mouse-cutie.gif",
                "https://i.pinimg.com/736x/c1/68/ac/c168ac916290329a48390c6ee209442c.jpg"
            ];

            noBtn.addEventListener("click", () => {                
                if (scale > 0.5) {
                    scale -= 0.25;
                    if (yesScale < 2){
                        yesScale += 0.1;
                        yesBtn.style.transform = `scale(${yesScale})`;
                    }
                }
                else {
                    // Random position
                    const randX = Math.random() * maxX;
                    const randY = Math.random() * maxY;

                    noBtn.style.left = randX + "px";
                    noBtn.style.top = randY + "px";
                }
                
                if (textIndex < noTexts.length - 1){
                    textIndex += 1;
                    noBtn.textContent = noTexts[textIndex];
                }

                noBtn.style.transform = `scale(${scale})`;
                gif_image.src = gifs_hamsters[hamsterIndex];
                hamsterIndex = 1;
            });
            noBtn.addEventListener("pointerenter", () => {
                noBtn.style.transform = `scale(${scale + 0.1})`;
            });
            noBtn.addEventListener("pointerleave", () => {
                noBtn.style.transform = `scale(${scale})`;
            });

            yesBtn.addEventListener("click", () => {
                document.body.innerHTML = `
                    <h1 style="color:white;">Sabía que dirías que sí <3</h1>
                    <img src="https://media.tenor.com/h_jy2s28rlYAAAAj/spinning-cat.gif">
                `
            });
            yesBtn.addEventListener("pointerenter", () => {
                yesBtn.style.transform = `scale(${yesScale + 0.1})`;
            });
            yesBtn.addEventListener("pointerleave", () => {
                yesBtn.style.transform = `scale(${yesScale})`;
            });


            // Floating hearts
            function createHeart() {
                const heart = document.createElement("div");
                heart.classList.add("heart");
                if (Math.random() > 0.5)
                    heart.innerHTML = "💘";
                else
                    heart.innerHTML = "💖";

                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = (20 + Math.random() * 30) + "px";
                heart.style.animationDuration = (4 + Math.random() * 3) + "s";

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }

            setInterval(createHeart, 400);
        </script>
    </body>
</html>
